# ====================================================================
# DEVELOPMENT ONLY — Do not use in production.
# For production, use deployment/docker/docker-compose.yml instead.
# ====================================================================

version: "3.8"

services:
  # MySQL 8.0
  mysql:
    image: mysql:8.0
    container_name: ancerlarins_mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_DATABASE: ancerlarins
      MYSQL_USER: ancerlarins
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ancerlarins_secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ancerlarins_root_secret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and queues
  redis:
    image: redis:7-alpine
    container_name: ancerlarins_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-ancerlarins_redis_secret} --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ancerlarins_redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # phpMyAdmin for database management (DEV ONLY)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ancerlarins_phpmyadmin
    restart: unless-stopped
    ports:
      - "127.0.0.1:5050:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ancerlarins_root_secret}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
