global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "prometheus-alerts.yml"

scrape_configs:
  # Laravel application metrics
  - job_name: laravel
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ["nginx:80"]

  # Nginx stub_status metrics (via nginx-prometheus-exporter)
  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]

  # PostgreSQL metrics
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # Redis metrics
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  # Node (host) metrics for disk/CPU/memory alerts
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
