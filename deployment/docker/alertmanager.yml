global:
  resolve_timeout: 5m
  smtp_from: 'alertmanager@ancerlarins.com'
  smtp_smarthost: '${SMTP_HOST}:${SMTP_PORT}'
  smtp_auth_username: '${SMTP_USERNAME}'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default
  routes:
    # Critical alerts → immediate notification
    - match:
        severity: critical
      receiver: critical
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts → standard notification
    - match:
        severity: warning
      receiver: default

receivers:
  - name: default
    email_configs:
      - to: 'ops@ancerlarins.com'
        send_resolved: true
        headers:
          Subject: '[AncerLarins {{ .Status }}] {{ .GroupLabels.alertname }}'

  - name: critical
    email_configs:
      - to: 'ops@ancerlarins.com'
        send_resolved: true
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }} - AncerLarins'
    # Uncomment and configure when Slack is set up:
    # slack_configs:
    #   - api_url: '${SLACK_WEBHOOK_URL}'
    #     channel: '#alerts-critical'
    #     title: '{{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
    #     send_resolved: true

inhibit_rules:
  # If a critical alert fires, suppress the same warning
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname']
